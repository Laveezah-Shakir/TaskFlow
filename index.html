<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
  <style>
    :root {
      --bg: #0f0f13;
      --card: #17171f;
      --card2: #1e1e28;
      --accent: #c084fc;
      --accent2: #818cf8;
      --text: #f1f0f5;
      --muted: #7c7a8e;
      --border: rgba(255,255,255,0.07);
      --done: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,132,252,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(129,140,248,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .app {
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }

    header .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    /* Input Card */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .input-card input {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-card input::placeholder { color: var(--muted); }

    .input-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,132,252,0.15);
    }

    .input-card button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
    }

    .input-card button:hover { opacity: 0.85; transform: scale(1.05); }
    .input-card button:active { transform: scale(0.97); }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stat-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .stat-pill span { color: var(--text); font-weight: 500; }

    /* Tasks */
    .tasks-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-top: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .tasks-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    #task-list { padding: 8px; }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-state i { font-size: 28px; margin-bottom: 12px; display: block; opacity: 0.4; }

    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      animation: slideIn 0.25s ease both;
    }

    .task:hover { background: var(--card2); }

    .task .check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: transparent;
      transition: all 0.2s;
      pointer-events: none;
    }

    .task .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      transition: color 0.2s;
      word-break: break-word;
    }

    .task .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .task:hover .del-btn { opacity: 1; }
    .task .del-btn:hover { background: rgba(248,113,113,0.15); color: #f87171; }

    /* Completed */
    .task.completed .check {
      background: var(--done);
      border-color: var(--done);
      color: #0f0f13;
    }

    .task.completed .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <p class="label">Productivity</p>
      <h1>My To-Do List</h1>
      <p class="subtitle">Stay focused, stay on track.</p>
    </header>

    <div class="input-card">
      <input id="task-input" type="text" placeholder="Add a new task…" autocomplete="off" />
      <button id="add-btn" title="Add task"><i class="fas fa-plus"></i></button>
    </div>

    <div class="stats">
      <div class="stat-pill">Total: <span id="total">0</span></div>
      <div class="stat-pill">Done: <span id="done-count">0</span></div>
      <div class="stat-pill">Left: <span id="left-count">0</span></div>
    </div>

    <div class="tasks-card">
      <div class="tasks-header">Tasks</div>
      <div id="task-list">
        <div class="empty-state" id="empty">
          <i class="fas fa-clipboard-list"></i>
          Nothing here yet. Add your first task!
        </div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty');
    const totalEl = document.getElementById('total');
    const doneEl = document.getElementById('done-count');
    const leftEl = document.getElementById('left-count');

    function updateStats() {
      const tasks = list.querySelectorAll('.task');
      const done = list.querySelectorAll('.task.completed');
      totalEl.textContent = tasks.length;
      doneEl.textContent = done.length;
      leftEl.textContent = tasks.length - done.length;
      empty.style.display = tasks.length === 0 ? 'block' : 'none';
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const task = document.createElement('div');
      task.className = 'task';
      task.innerHTML = `
        <div class="check"><i class="fas fa-check"></i></div>
        <span class="task-text">${text.replace(/</g,'&lt;')}</span>
        <button class="del-btn" title="Delete"><i class="fas fa-trash-alt"></i></button>
      `;

      task.addEventListener('click', function(e) {
        if (e.target.closest('.del-btn')) return;
        this.classList.toggle('completed');
        updateStats();
      });

      task.querySelector('.del-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        task.style.transition = 'opacity 0.2s, transform 0.2s';
        task.style.opacity = '0';
        task.style.transform = 'translateX(20px)';
        setTimeout(() => { task.remove(); updateStats(); }, 200);
      });

      list.appendChild(task);
      input.value = '';
      input.focus();
      updateStats();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    updateStats();
  </script>
</body>
</html>
